<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Horror Prompt Engine PRO</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

h1{
color:#ff3c3c;
}

.container{
max-width:900px;
margin:auto;
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:6px;
background:#ff3c3c;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff1c1c;
}

textarea{
width:100%;
height:300px;
margin-top:20px;
background:#111;
color:#00ff9d;
border:1px solid #333;
padding:15px;
font-family:monospace;
}

.controls{
margin-bottom:20px;
}

input{
padding:8px;
width:80px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Horror Prompt Engine PRO</h1>

<div class="controls">

<button onclick="generatePrompt()">Generate Prompt</button>

<button onclick="generateBatch()">Generate Batch</button>

<button onclick="copyPrompt()">Copy</button>

<button onclick="downloadPrompt()">Download</button>

<br><br>

Batch Size:

<input id="batchSize" type="number" value="10" min="1" max="50">

</div>

<textarea id="output"></textarea>

</div>

<script>

const locations = [
"abandoned hospital",
"haunted asylum",
"foggy cemetery",
"abandoned school",
"dark forest",
"underground bunker",
"cursed village",
"ritual chamber",
"forgotten church",
"collapsed subway tunnel"
];

const monsters = [
"shadow demon",
"faceless ghost",
"rotting corpse",
"ancient eldritch creature",
"whispering spirit",
"skinwalker",
"pale crawler",
"possessed nun",
"mutated human",
"hollow-eyed entity"
];

const styles = [
"analog horror",
"cinematic horror",
"photorealistic horror",
"found footage horror",
"dark fantasy horror",
"psychological horror",
"Lovecraftian horror"
];

const lighting = [
"flickering candlelight",
"moonlight through fog",
"dim flashlight beam",
"red emergency lighting",
"eerie green glow",
"dark misty atmosphere"
];

const camera = [
"cinematic wide shot",
"close-up horror shot",
"POV camera angle",
"found footage camera",
"dramatic low angle",
"overhead drone shot"
];

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function createPrompt(){

return `${rand(styles)} scene of a ${rand(monsters)} inside a ${rand(locations)}, ${rand(camera)}, illuminated by ${rand(lighting)}, ultra detailed, terrifying atmosphere, cinematic, volumetric fog, dramatic shadows`;

}

function generatePrompt(){
document.getElementById("output").value = createPrompt();
}

function generateBatch(){

let size = document.getElementById("batchSize").value;
let results = [];

for(let i=0;i<size;i++){
results.push(createPrompt());
}

document.getElementById("output").value = results.join("\n\n");
}

function copyPrompt(){

let text = document.getElementById("output");

navigator.clipboard.writeText(text.value);

alert("Copied!");
}

function downloadPrompt(){

let text = document.getElementById("output").value;

let blob = new Blob([text], {type:"text/plain"});

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "horror-prompts.txt";

a.click();
}

  </script>
  
</body>
  </html>
