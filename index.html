<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine v12</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:450px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine v12
</div>

<div class="container">

<div class="card">

<label>Prompt Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
</select>

<label>Location (optional)</label>
<input id="location" placeholder="leave empty for random">

<label>Time</label>
<input id="time" placeholder="midnight">

<label>Creature (optional)</label>
<input id="creature" placeholder="leave empty for random">

<label>Number of Ideas</label>
<select id="batch">
<option>1</option>
<option>10</option>
<option>30</option>
<option>50</option>
<option>100</option>
</select>

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

const locations=[
"abandoned hospital",
"haunted school",
"old cemetery",
"dark forest trail",
"abandoned mall",
"empty apartment building",
"underground tunnel",
"forgotten village"
]

const monsters=[
"kuntilanak",
"pocong",
"genderuwo",
"leak bali",
"palasik",
"shadow creature",
"faceless woman",
"crawling ghost"
]

const hooks=[
"Guys... kalian lihat itu di belakang saya?",
"Saya dengar sesuatu di sana...",
"Tunggu... ada yang bergerak.",
"Tempat ini harusnya kosong...",
"Ada suara langkah..."
]

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function createStory(){

let engine=document.getElementById("engine").value
let location=document.getElementById("location").value
let time=document.getElementById("time").value
let creature=document.getElementById("creature").value

if(location==""){
location=rand(locations)
}

if(creature==""){
creature=rand(monsters)
}

return `

HOOK
${rand(hooks)}

TITLE
Terrifying ${creature} Encounter in ${location}

THUMBNAIL PROMPT
terrified vlogger face illuminated by flashlight,
${creature} behind him,
dark ${location},
cinematic horror lighting

IMAGE PROMPT
ultra realistic horror scene,
smartphone POV,
exploring ${location} at ${time},
${creature} standing in darkness

SCENE 1
POV arriving at ${location}

SCENE 2
Exploring area with flashlight

SCENE 3
Strange sound in darkness

SCENE 4
${creature} appearing in shadows

SCENE 5
Creature suddenly rushing toward camera

SCENE 6
Running escape with chaotic camera shake

ENGINE
optimized for ${engine}

`
}

function generate(){

let count=document.getElementById("batch").value

let arr=[]

for(let i=0;i<count;i++){
arr.push(createStory())
}

document.getElementById("output").value=arr.join("\n\n====================\n\n")

}

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")
}

function downloadText(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="horror_prompts.txt"

a.click()

}

function clearText(){
document.getElementById("output").value=""
}

</script>

</body>
</html>
