<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>AI Horror Prompt Engine v5</title>

<style>

body{
background:#0c0c0c;
color:#eaeaea;
font-family:Arial;
padding:30px;
}

h1{
color:#ff3c3c;
}

.container{
max-width:1000px;
margin:auto;
}

.controls{
margin-bottom:20px;
}

button{
background:#ff3c3c;
border:none;
padding:10px 15px;
margin:5px;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff2020;
}

textarea{
width:100%;
height:350px;
background:#111;
color:#00ffa6;
border:1px solid #333;
padding:15px;
font-family:monospace;
}

input,select{
padding:6px;
margin:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Horror Prompt Engine v5</h1>

<div class="controls">

Batch
<input id="batchSize" type="number" value="1" min="1" max="20">

Intensity
<input id="intensity" type="range" min="1" max="5" value="3">

Operator
<select id="operator">

<option>curious explorer</option>
<option>nervous investigator</option>
<option>paranormal vlogger</option>
<option>terrified witness</option>

</select>

<br>

<button onclick="generatePrompt()">Generate</button>
<button onclick="generateBatch()">Generate Batch</button>
<button onclick="copyPrompt()">Copy</button>
<button onclick="downloadPrompt()">Download</button>

</div>

<textarea id="output"></textarea>

</div>

<script>

const locations=[

"abandoned hospital corridor",
"foggy cemetery at midnight",
"collapsed subway tunnel",
"abandoned rural house",
"dark forest trail",
"empty school hallway",
"underground bunker",
"forgotten church interior",
"abandoned amusement park",
"derelict factory building"

];

const monsters=[

"pale crawler",
"shadow demon",
"faceless ghost",
"rotting corpse entity",
"skinwalker creature",
"hollow eyed humanoid",
"possessed nun",
"long limbed creature",
"whispering spirit",
"crawling shadow figure"

];

const lighting=[

"dim flashlight beam",
"moonlight through fog",
"flickering fluorescent light",
"weak phone flashlight",
"red emergency lighting",
"cold blue night lighting"

];

const defects=[

"heavy sensor noise",
"grainy low light footage",
"VHS distortion",
"motion blur",
"compression artifacts"

];

const sounds=[

"distant whispering",
"unexplained footsteps",
"metal scraping sounds",
"wind echoing through the area",
"faint scratching noises"

];

function rand(arr){

return arr[Math.floor(Math.random()*arr.length)];

}

function createPrompt(){

let monster=rand(monsters);
let location=rand(locations);
let light=rand(lighting);
let defect=rand(defects);
let sound=rand(sounds);

let operator=document.getElementById("operator").value;

let intensity=document.getElementById("intensity").value;

let aggression=[

"barely visible presence",
"slow disturbing movement",
"sudden appearance",
"aggressive chase",
"violent attack"

];

let action=aggression[intensity-1];

return `

TITLE
Lost Footage of a ${monster} in a ${location}


OUTPUT 1 — IMAGE PROMPT (FIRST FRAME)

found footage horror frame captured by a handheld smartphone camera, ${operator} recording inside a ${location}, a ${monster} barely visible in darkness, ${light}, ${defect}, analog horror style


OUTPUT 2 — VIDEO SCENE 1 (EXPLORATION)

handheld smartphone footage recorded by a ${operator}, slowly scanning a ${location}, cautious camera movement, ${light}, ${sound}


OUTPUT 3 — VIDEO SCENE 2 (SUSPENSE)

camera moving deeper inside the ${location}, strange shadows appearing, ${monster} briefly visible in the distance, tension building, ${defect}


OUTPUT 4 — VIDEO SCENE 3 (ENCOUNTER)

the ${monster} suddenly appearing in front of the camera, chaotic handheld movement, panic reaction from the ${operator}


OUTPUT 5 — VIDEO SCENE 4 (CLIMAX)

the ${monster} ${action} toward the camera, violent shaking footage, terrifying final seconds before the recording abruptly ends

`;

}

function generatePrompt(){

document.getElementById("output").value=createPrompt();

}

function generateBatch(){

let size=document.getElementById("batchSize").value;

let results=[];

for(let i=0;i<size;i++){

results.push(createPrompt());

}

document.getElementById("output").value=results.join("\n\n============================\n\n");

}

function copyPrompt(){

navigator.clipboard.writeText(document.getElementById("output").value);

alert("Copied");

}

function downloadPrompt(){

let text=document.getElementById("output").value;

let blob=new Blob([text],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="horror-prompts.txt";

a.click();

}

</script>

</body>
</html>
