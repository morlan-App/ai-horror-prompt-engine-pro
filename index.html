<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Found Footage Horror Prompt Engine</title>
<style>

body{
background:#0b0b0b;
color:#e6e6e6;
font-family:Arial, sans-serif;
padding:30px;
text-align:center;
}

h1{
color:#ff4040;
margin-bottom:10px;
}

.container{
max-width:950px;
margin:auto;
}

.controls{
margin-bottom:20px;
}

button{
background:#ff4040;
border:none;
padding:10px 16px;
margin:6px;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff2020;
}

textarea{
width:100%;
height:320px;
background:#111;
color:#00ff9d;
border:1px solid #333;
padding:15px;
font-family:monospace;
}

input[type=number]{
width:70px;
padding:5px;
}

input[type=range]{
width:200px;
}

</style>
</head>

<body>

<div class="container">

<h1>Found Footage Horror Prompt Engine</h1>

<div class="controls">

Batch
<input id="batchSize" type="number" value="1" min="1" max="20">

Intensity
<input id="intensity" type="range" min="1" max="5" value="3">

<br>

<button onclick="generatePrompt()">Generate</button>
<button onclick="generateBatch()">Generate Batch</button>
<button onclick="copyPrompt()">Copy</button>
<button onclick="downloadPrompt()">Download</button>

</div>

<textarea id="output"></textarea>

</div>

<script>

const locations=[
"abandoned hospital corridor",
"foggy cemetery",
"collapsed subway tunnel",
"dark forest trail",
"abandoned rural house",
"empty school hallway",
"underground bunker",
"forgotten church"
];

const monsters=[
"pale crawler",
"shadow demon",
"faceless ghost",
"rotting corpse entity",
"skinwalker creature",
"hollow eyed humanoid"
];

const lighting=[
"dim flashlight beam",
"moonlight through fog",
"flickering fluorescent lights",
"weak phone flashlight",
"red emergency lighting"
];

const sounds=[
"distant whispering",
"faint metallic noises",
"strange scratching sounds",
"unexplained footsteps",
"wind echoing through the area"
];

const cameraDefects=[
"heavy sensor noise",
"grainy low light footage",
"VHS distortion",
"motion blur",
"compression artifacts"
];

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generateTitle(monster,location){
return `Found Footage of a ${monster} Discovered in an ${location}`;
}

function createPrompt(){

let monster=rand(monsters);
let location=rand(locations);
let light=rand(lighting);
let sound=rand(sounds);
let defect=rand(cameraDefects);

let intensity=document.getElementById("intensity").value;

let tensionWords=[
"uneasy atmosphere",
"growing tension",
"disturbing presence",
"terrifying encounter",
"chaotic horror climax"
];

return `

TITLE
${generateTitle(monster,location)}

OUTPUT 1 — THUMBNAIL / IMAGE PROMPT

found footage horror frame captured by an amateur handheld camera inside a ${location}, ${monster} barely visible in darkness, ${light}, ${defect}, unsettling atmosphere, analog horror style


OUTPUT 2 — VIDEO SCENE 1 (EXPLORATION)

amateur handheld footage exploring a ${location}, cautious camera movement, ${light}, ${sound}, ${tensionWords[0]}


OUTPUT 3 — VIDEO SCENE 2 (SUSPENSE)

camera moving deeper inside the ${location}, shadows shifting, ${monster} briefly visible in the distance, ${tensionWords[1]}, ${defect}


OUTPUT 4 — VIDEO SCENE 3 (ENCOUNTER)

the ${monster} suddenly appearing in front of the camera inside the ${location}, panic movement, intense handheld shaking, ${tensionWords[3]}


OUTPUT 5 — VIDEO SCENE 4 (CLIMAX)

the ${monster} rushing toward the camera, chaotic handheld motion, terrifying final seconds of footage before recording abruptly ends

`;

}

function generatePrompt(){
document.getElementById("output").value=createPrompt();
}

function generateBatch(){

let size=document.getElementById("batchSize").value;

let results=[];

for(let i=0;i<size;i++){
results.push(createPrompt());
}

document.getElementById("output").value=results.join("\n\n============================\n\n");

}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("output").value);
alert("Copied");
}

function downloadPrompt(){

let text=document.getElementById("output").value;

let blob=new Blob([text],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="horror-prompts.txt";

a.click();

}

</script>

</body>
</html>
