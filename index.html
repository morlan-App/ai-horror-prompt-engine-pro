<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine v20</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:600px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine v20
</div>

<div class="container">

<div class="card">

<label>AI Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
<option>Google Flow</option>
</select>

<label>Location</label>
<input id="location" placeholder="abandoned hospital">

<label>Creature</label>
<input id="creature" placeholder="kuntilanak">

<label>Time</label>
<input id="time" placeholder="midnight">

<label>Batch Stories</label>
<input id="batch" type="number" value="1">

<label>Jump Scare Time (seconds)</label>
<input id="jumpscare" type="number" value="8">

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

function generate(){

let location=document.getElementById("location").value
let creature=document.getElementById("creature").value
let time=document.getElementById("time").value
let engine=document.getElementById("engine").value
let batch=parseInt(document.getElementById("batch").value)
let jumpscare=document.getElementById("jumpscare").value

let output=""

for(let i=1;i<=batch;i++){

output+=`

===== STORY ${i} =====

HOOK
"This place looked empty… but something here is definitely watching me."

TITLE
Explorer investigates a haunted ${location}

VIDEO IDEA
POV exploration where a paranormal vlogger explores a dark ${location} at ${time} and slowly realizes something terrifying is inside.

IMAGE PROMPT (NO CREATURE)

Ultra realistic smartphone POV inside a dark ${location} at ${time}. A paranormal explorer holds a weak flashlight while standing at the entrance of a long abandoned corridor. Dust floats in the air and broken doors line the hallway. The environment feels silent, tense and eerie. Cinematic horror lighting, deep shadows, realistic found footage style. No creature visible.

SCENE 1 – CONTINUATION

POV handheld smartphone footage continuing from the same frame. The explorer slowly walks deeper into the corridor while the flashlight beam shakes slightly from nervous hands. Footsteps echo through the empty building.

SCENE 2 – TENSION BUILD

The camera slowly turns toward a darker side hallway. The flashlight scans cracked walls and broken furniture while distant creaking sounds echo.

SCENE 3 – STRANGE SIGN

The explorer suddenly stops after hearing a faint whispering sound deeper inside the building. The camera shakes slightly while scanning the darkness.

SCENE 4 – SHADOW MOVEMENT

A faint shadow briefly moves across the far end of the hallway before disappearing. The explorer zooms the camera slightly trying to see what moved.

SCENE 5 – CREATURE REVEAL

The ${creature} slowly appears at the far end of the corridor partially illuminated by the flashlight beam.

SCENE 6 – JUMP SCARE (00:${jumpscare})

The ${creature} suddenly rushes toward the camera causing violent handheld shaking as the explorer panics and runs.

SCRIPT

Explorer: "Okay guys… this place feels really strange."

(sound in distance)

Explorer: "Did you hear that?"

(camera turns)

Explorer: "WHAT THE HELL IS THAT?!"

THUMBNAIL PROMPT

Terrified explorer looking at the camera with shocked expression, ${creature} appearing behind in a dark ${location}, dramatic horror lighting, viral YouTube horror thumbnail.

HASHTAGS
#horror #foundfootage #scary #ghost #urbanexploration

ENGINE
Optimized for ${engine}

`

}

document.getElementById("output").value=output

}

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")
}

function downloadText(){

let text=document.getElementById("output").value
let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="horror_prompt.txt"
a.click()

}

function clearText(){
document.getElementById("output").value=""
}

</script>

</body>
</html>
