<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine v14</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:520px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine v14
</div>

<div class="container">

<div class="card">

<label>Prompt Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
</select>

<label>Location</label>
<input id="location" placeholder="abandoned hospital">

<label>Creature</label>
<input id="creature" placeholder="kuntilanak">

<label>Time</label>
<input id="time" placeholder="midnight">

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate Prompt</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

function createStory(){

let location=document.getElementById("location").value
let creature=document.getElementById("creature").value
let time=document.getElementById("time").value
let engine=document.getElementById("engine").value

return `

IMAGE PROMPT

Ultra realistic horror frame captured from a smartphone POV. A nervous paranormal vlogger stands inside a dark ${location} at ${time}. The environment is dimly lit by a weak flashlight beam shaking slightly from the vlogger’s hands. Dust particles float in the air and broken doors line the corridor. At the far end of the hallway a faint silhouette of a ${creature} can barely be seen standing motionless in the darkness. Cinematic horror lighting, extremely realistic found-footage style.

SCENE 1 — CONTINUATION

POV handheld smartphone footage continuing from the same hallway inside the ${location}. The camera slowly moves forward while the flashlight beam trembles slightly due to the vlogger’s nervous hands. Each step creates a subtle camera shake and faint echoing footsteps. The corridor is quiet except for distant creaking sounds. The camera cautiously scans the environment while approaching the area where the shadowy silhouette was previously seen.

SCENE 2 — BUILDING TENSION

The camera slowly turns toward a darker side corridor. The flashlight beam flickers across cracked walls and broken furniture. The vlogger hesitates and the camera movement becomes more unstable as the person steps forward carefully. In the far distance the ${creature} can briefly be seen standing silently before disappearing into the shadows. The camera zooms slightly while the vlogger whispers nervously.

SCENE 3 — FIRST ENCOUNTER

The camera jerks suddenly as the vlogger realizes the figure has moved closer. The flashlight scans the hallway rapidly. Handheld shaking becomes more intense as the vlogger steps backward. The ${creature} is now partially visible behind a doorway, staring silently from the darkness.

SCENE 4 — PANIC

The vlogger quickly turns around while backing away. The camera becomes chaotic and unstable as breathing grows louder. The flashlight beam swings wildly across the corridor. The ${creature} slowly moves toward the camera from the shadows.

SCENE 5 — CHASE

The vlogger suddenly starts running through the corridor. The smartphone footage shakes violently while the flashlight beam bounces across the walls and floor. Footsteps echo loudly through the building. The ${creature} briefly appears behind the camera frame chasing from the darkness.

SCENE 6 — ESCAPE

The vlogger bursts through an exit door leading outside the building. The camera shakes heavily while the person turns back toward the entrance. For a brief moment the silhouette of the ${creature} can be seen standing inside the doorway before disappearing into darkness.

ENGINE
Optimized for ${engine}

`

}

function generate(){
document.getElementById("output").value=createStory()
}

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")
}

function downloadText(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="horror_prompt.txt"

a.click()

}

function clearText(){
document.getElementById("output").value=""
}

</script>

</body>
</html>
