<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine v7</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#121212;
padding:18px;
text-align:center;
font-weight:bold;
font-size:20px;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:350px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine v7
</div>

<div class="container">

<div class="card">

<label>Content Type</label>
<select id="type">
<option>POV first person vlog</option>
<option>paranormal investigation vlog</option>
<option>urban exploration vlog</option>
</select>

<label>Location</label>
<input id="location" placeholder="example: abandoned hospital">

<label>Time</label>
<input id="time" placeholder="example: midnight">

<label>Horror Creature</label>
<input id="creature" placeholder="example: pale crawler">

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generatePrompt()">Generate Prompt</button>

<button onclick="copyPrompt()">Copy</button>

<button onclick="downloadPrompt()">Download</button>

<button onclick="clearPrompt()">Clear</button>

</div>

</div>

</div>

<script>

function generatePrompt(){

let type=document.getElementById("type").value
let location=document.getElementById("location").value
let time=document.getElementById("time").value
let creature=document.getElementById("creature").value

let result=`

TITLE
Terrifying Footage of a ${creature} Found in a ${location}


OUTPUT 1 — IMAGE PROMPT

hyper realistic horror frame, handheld smartphone camera POV, ${type}, recording inside a ${location} at ${time}, the ${creature} barely visible in darkness, grainy footage, realistic lighting


OUTPUT 2 — VIDEO SCENE 1

handheld smartphone footage, ${type} exploring a ${location} at ${time}, camera slowly scanning surroundings, nervous breathing behind the camera


OUTPUT 3 — VIDEO SCENE 2

camera moving deeper into the ${location}, strange noises heard in the background, the ${creature} briefly visible in the shadows


OUTPUT 4 — VIDEO SCENE 3

the ${creature} suddenly appearing in front of the camera, chaotic handheld movement, the vlogger panicking


OUTPUT 5 — VIDEO SCENE 4

the ${creature} slowly approaching the camera while the vlogger runs away, camera shaking violently, terrifying final seconds


YOUTUBE DESCRIPTION

A paranormal vlogger explores a ${location} at ${time}. What starts as a simple investigation quickly turns into a terrifying encounter with a ${creature}.


HASHTAGS

#horror #analoghorror #foundfootage #scary #aivideo

`

document.getElementById("output").value=result

}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")
}

function downloadPrompt(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="horror-prompts.txt"

a.click()

}

function clearPrompt(){
document.getElementById("output").value=""
}

</script>

</body>
</html>
