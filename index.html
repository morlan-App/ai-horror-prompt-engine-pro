<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Content Factory v25</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:700px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Content Factory v25
</div>

<div class="container">

<div class="card">

<label>AI Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
<option>Google Flow</option>
</select>

<label>POV Mode</label>
<select id="pov">
<option>Vlogger Camera</option>
<option>Bodycam</option>
<option>CCTV</option>
<option>Police Cam</option>
</select>

<label>Location (optional)</label>
<input id="location">

<label>Creature (optional)</label>
<input id="creature">

<label>Time</label>
<input id="time" value="midnight">

<label>Scene Count</label>
<input id="sceneCount" type="number" value="6">

<label>Batch Stories</label>
<input id="batch" type="number" value="1">

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

const locations=[
"abandoned hospital",
"haunted school",
"dark forest",
"abandoned apartment",
"old cemetery",
"abandoned factory",
"abandoned mall",
"underground tunnel",
"abandoned village"
]

const ghosts=[
"kuntilanak",
"pocong",
"genderuwo",
"shadow entity",
"faceless ghost",
"pale ghost woman"
]

const tensionScenes=[
"a distant metallic sound echoes through the building",
"a faint whisper is heard behind the explorer",
"the flashlight flickers briefly",
"a shadow suddenly moves across the wall",
"a door slowly creaks somewhere nearby"
]

function generate(){

let location=document.getElementById("location").value
let creature=document.getElementById("creature").value
let time=document.getElementById("time").value
let sceneCount=parseInt(document.getElementById("sceneCount").value)
let batch=parseInt(document.getElementById("batch").value)
let pov=document.getElementById("pov").value
let engine=document.getElementById("engine").value

if(sceneCount<3){
alert("Minimum scene adalah 3")
return
}

if(location==""){
location=locations[Math.floor(Math.random()*locations.length)]
}

if(creature==""){
creature=ghosts[Math.floor(Math.random()*ghosts.length)]
}

let output=""

for(let i=1;i<=batch;i++){

let title=`I Was Exploring a ${location}… Then This ${creature} Appeared`

let hook=`I thought this place was abandoned… until something moved in the darkness.`

let ytTags=`#horror #foundfootage #ghost #paranormal #${creature} #scary`
let fbTags=`#horrorvideo #scaryvideo #ghostvideo #paranormal #${creature}`

output+=`

===== STORY ${i} =====

SHORTS HOOK
${hook}

YOUTUBE TITLE
${title}

VIDEO IDEA
POV ${pov} paranormal exploration inside a ${location} at ${time}.

IMAGE PROMPT (NO CREATURE)

Ultra realistic ${pov} footage inside a dark ${location} at ${time}. A paranormal explorer holding a flashlight records the dark environment. Dust particles float in the air creating a tense cinematic horror atmosphere. Realistic found footage style.

`

for(let s=1;s<=sceneCount;s++){

if(s==1){

output+=`
SCENE ${s}

The explorer slowly walks deeper into the ${location}. The camera slightly shakes while the flashlight scans the dark corridor.
`

}

else if(s==sceneCount){

output+=`
SCENE ${s} – EXTREME CHASE

The ${creature} suddenly appears from the darkness and charges toward the camera.

The explorer panics and runs.

The camera shakes violently with chaotic handheld movement.

Heavy breathing and loud footsteps echo.

The flashlight beam swings wildly while the creature rapidly closes the distance behind.

The camera tilts and almost drops as the explorer desperately runs through the dark hallway.
`

}

else{

let tension=tensionScenes[Math.floor(Math.random()*tensionScenes.length)]

output+=`
SCENE ${s}

${tension}.
`

}

}

output+=`

YOUTUBE DESCRIPTION

A paranormal explorer investigates a haunted ${location} at ${time}. What starts as a normal exploration suddenly turns into a terrifying encounter with a ${creature}.

Watch until the end.

YOUTUBE HASHTAGS
${ytTags}

FACEBOOK PRO HASHTAGS
${fbTags}

ENGINE
Optimized for ${engine}

`

}

document.getElementById("output").value=output

}

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")
}

function downloadText(){

let text=document.getElementById("output").value
let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="horror_prompts.txt"
a.click()

}

function clearText(){
document.getElementById("output").value=""
}

</script>

</body>
</html>
