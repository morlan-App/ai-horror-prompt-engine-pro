<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Horror Prompt Engine PRO</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

h1{
color:#ff3c3c;
}

.container{
max-width:900px;
margin:auto;
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:6px;
background:#ff3c3c;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff1c1c;
}

textarea{
width:100%;
height:300px;
margin-top:20px;
background:#111;
color:#00ff9d;
border:1px solid #333;
padding:15px;
font-family:monospace;
}

.controls{
margin-bottom:20px;
}

input{
padding:8px;
width:80px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Horror Prompt Engine PRO</h1>

<div class="controls">

<button onclick="generatePrompt()">Generate Prompt</button>

<button onclick="generateBatch()">Generate Batch</button>

<button onclick="copyPrompt()">Copy</button>

<button onclick="downloadPrompt()">Download</button>

<br><br>

Batch Size:

<input id="batchSize" type="number" value="10" min="1" max="50">

</div>

<textarea id="output"></textarea>

</div>

<script>

const locations = [
"abandoned hospital",
"foggy cemetery",
"haunted asylum",
"abandoned school",
"dark forest",
"underground tunnel",
"cursed village",
"ritual chamber",
"forgotten church",
"collapsed subway station"
];

const monsters = [
"shadow demon",
"pale crawler",
"faceless ghost",
"rotting corpse entity",
"ancient eldritch creature",
"whispering spirit",
"skinwalker",
"possessed nun",
"hollow-eyed entity",
"mutated humanoid creature"
];

const styles = [
"analog horror",
"cinematic horror",
"photorealistic horror",
"found footage horror",
"dark fantasy horror",
"Lovecraftian horror"
];

const lighting = [
"flickering candlelight",
"moonlight through fog",
"dim flashlight beam",
"red emergency lighting",
"eerie green glow",
"dark misty atmosphere"
];

const camera = [
"cinematic wide shot",
"dramatic low angle shot",
"handheld found footage camera",
"close-up horror shot",
"slow tracking shot",
"over-the-shoulder camera view"
];

const motion = [
"slow camera movement",
"shaky handheld motion",
"slow cinematic zoom",
"creeping forward camera movement",
"slow pan through darkness"
];

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function createPrompt(){

let monster = rand(monsters);
let location = rand(locations);
let style = rand(styles);
let light = rand(lighting);

let cam1 = rand(camera);
let cam2 = rand(camera);
let cam3 = rand(camera);
let cam4 = rand(camera);

return `

OUTPUT 1 — IMAGE PROMPT (THUMBNAIL)

${style} horror scene of a ${monster} inside a ${location}, ${cam1}, illuminated by ${light}, ultra detailed, cinematic composition, terrifying atmosphere, volumetric fog, dramatic shadows, 8k


OUTPUT 2 — VIDEO SCENE 1 (ESTABLISHING)

cinematic horror video of a ${location}, environment slowly revealed, ${cam1}, ${rand(motion)}, ${light}, eerie atmosphere, suspense building


OUTPUT 3 — VIDEO SCENE 2 (SUSPENSE)

the ${monster} partially visible in the darkness inside the ${location}, ${cam2}, ${rand(motion)}, tension rising, unsettling horror atmosphere


OUTPUT 4 — VIDEO SCENE 3 (ENCOUNTER)

full appearance of the ${monster}, moving inside the ${location}, ${cam3}, intense horror moment, flickering lights, dramatic tension


OUTPUT 5 — VIDEO SCENE 4 (CLIMAX)

the ${monster} approaching the camera inside the ${location}, ${cam4}, ${rand(motion)}, terrifying final moment, dark cinematic horror ending

`;
}

function generatePrompt(){
document.getElementById("output").value = createPrompt();
}

function generateBatch(){

let size = document.getElementById("batchSize").value;
let results = [];

for(let i=0;i<size;i++){
results.push(createPrompt());
}

document.getElementById("output").value = results.join("\n\n====================\n\n");
}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("output").value);
alert("Copied!");
}

function downloadPrompt(){

let text = document.getElementById("output").value;

let blob = new Blob([text],{type:"text/plain"});

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "horror-prompts.txt";

a.click();

}

</script>
  
</body>
  </html>
