<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine v19</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:580px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine v19
</div>

<div class="container">

<div class="card">

<label>AI Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
<option>Google Flow</option>
</select>

<label>Location</label>
<input id="location" placeholder="abandoned hospital">

<label>Creature</label>
<input id="creature" placeholder="kuntilanak">

<label>Time</label>
<input id="time" placeholder="midnight">

<label>Batch Stories</label>
<input id="batch" type="number" value="1">

<label>Jump Scare Time (seconds)</label>
<input id="jumpscare" type="number" value="8">

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

function generate(){

let location=document.getElementById("location").value
let creature=document.getElementById("creature").value
let time=document.getElementById("time").value
let engine=document.getElementById("engine").value
let batch=parseInt(document.getElementById("batch").value)
let jumpscare=document.getElementById("jumpscare").value

let output=""

for(let i=1;i<=batch;i++){

output+=`

===== STORY ${i} =====

HOOK
"This might be the scariest thing I've ever recorded..."

TITLE
Explorer records a terrifying ${creature} inside ${location}

VIDEO IDEA
POV horror exploration where a vlogger accidentally records a ${creature} inside ${location} at ${time}.

IMAGE PROMPT
Ultra realistic smartphone POV inside ${location}, flashlight lighting, shadowy corridor, silhouette of ${creature}.

SCENE 1
Explorer enters the dark hallway carefully.

SCENE 2
Strange sound echoes.

SCENE 3
Shadow moves at the end of the corridor.

SCENE 4
The ${creature} slowly appears closer.

SCENE 5 – JUMP SCARE (00:${jumpscare})
The ${creature} suddenly appears extremely close to the camera causing violent shaking.

SCENE 6
Explorer runs away while the camera shakes violently.

SCRIPT

Explorer: "Guys… this place feels really weird."

(sound)

Explorer: "Did you hear that?"

(camera turns)

Explorer: "WHAT IS THAT?!"

THUMBNAIL PROMPT

Terrified explorer looking at camera, ${creature} behind, dark ${location}, dramatic horror lighting, viral YouTube thumbnail style.

HASHTAGS
#horror #scary #foundfootage #ghost #urbanexploration

ENGINE
Optimized for ${engine}

`

}

document.getElementById("output").value=output

}

function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")
}

function downloadText(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="horror_prompt.txt"

a.click()

}

function clearText(){
document.getElementById("output").value=""
}

</script>

</body>
</html>
