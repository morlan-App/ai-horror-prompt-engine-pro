<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine Creator</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:650px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine Creator v23
</div>

<div class="container">

<div class="card">

<label>AI Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
<option>Google Flow</option>
</select>

<label>Location (optional)</label>
<input id="location" placeholder="leave blank for random">

<label>Creature (optional)</label>
<input id="creature" placeholder="leave blank for random">

<label>Time</label>
<input id="time" placeholder="midnight">

<label>Scene Count (min 3)</label>
<input id="sceneCount" type="number" value="6">

<label>Batch Stories</label>
<input id="batch" type="number" value="1">

<label>Horror Intensity</label>
<select id="intensity">
<option>Normal</option>
<option>High</option>
<option>Extreme</option>
</select>

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

const locations=[
"abandoned hospital",
"haunted school",
"dark forest",
"abandoned apartment",
"old cemetery",
"abandoned factory",
"deserted train station",
"abandoned village",
"underground tunnel",
"abandoned mall"
]

const ghosts=[
"kuntilanak",
"pocong",
"genderuwo",
"shadow entity",
"faceless ghost",
"pale ghost woman",
"dark crawling creature"
]

const cameraMoves=[
"the camera slowly pans left",
"the explorer nervously turns the camera",
"the flashlight beam scans the hallway",
"the camera slowly zooms forward",
"the explorer shakily moves the camera"
]

const tensionScenes=[
"a distant metallic sound echoes",
"a faint whisper is heard",
"the flashlight flickers briefly",
"a shadow moves across the wall",
"something knocks softly in another room"
]

function generate(){

let location=document.getElementById("location").value
let creature=document.getElementById("creature").value
let time=document.getElementById("time").value
let sceneCount=parseInt(document.getElementById("sceneCount").value)
let batch=parseInt(document.getElementById("batch").value)
let intensity=document.getElementById("intensity").value
let engine=document.getElementById("engine").value

if(sceneCount<3){
alert("Scene minimum adalah 3")
return
}

if(location==""){
location=locations[Math.floor(Math.random()*locations.length)]
}

if(creature==""){
creature=ghosts[Math.floor(Math.random()*ghosts.length)]
}

let output=""

for(let i=1;i<=batch;i++){

let ytHashtags=`#horror #scary #foundfootage #ghost #paranormal #urbanexploration #${creature} #haunted #creepy`

let fbHashtags=`#horrorvideo #scaryvideo #ghostvideo #viralvideo #paranormalactivity #horrorstories #${creature} #exploration`

output+=`

===== STORY ${i} =====

HOOK
"I thought this place was empty… but something here is definitely watching me."

TITLE
Exploring a haunted ${location}

VIDEO IDEA
POV paranormal exploration inside a ${location} at ${time}.

IMAGE PROMPT (NO CREATURE)

Ultra realistic smartphone POV inside a dark ${location} at ${time}. A paranormal explorer stands at the entrance holding a flashlight while recording with a smartphone. Dust floats in the air and the atmosphere feels tense and silent. Cinematic horror lighting, realistic found footage style.

`

for(let s=1;s<=sceneCount;s++){

if(s==1){

output+=`
SCENE ${s}

POV handheld footage continuing from the image frame. The explorer slowly walks deeper into the ${location} while the flashlight beam shakes slightly from nervous hands.
`

}

else if(s==sceneCount){

output+=`
SCENE ${s} – CREATURE ATTACK

The ${creature} suddenly emerges from the darkness and violently rushes toward the camera causing chaotic handheld camera shaking.
`

}

else{

let move=cameraMoves[Math.floor(Math.random()*cameraMoves.length)]
let tension=tensionScenes[Math.floor(Math.random()*tensionScenes.length)]

output+=`
SCENE ${s}

${move}. Suddenly ${tension}.
`

}

}

output+=`

THUMBNAIL PROMPT

Terrified explorer looking at the camera while a shadowy ${creature} appears behind in a dark ${location}, dramatic horror lighting.

YOUTUBE HASHTAGS

${ytHashtags}

FACEBOOK PRO HASHTAGS

${fbHashtags}

ENGINE

Optimized for ${engine}

INTENSITY

${intensity}

`

}

document.getElementById("output").value=output

}

function copyText(){

navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")

}

function downloadText(){

let text=document.getElementById("output").value
let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="horror_prompt.txt"
a.click()

}

function clearText(){

document.getElementById("output").value=""

}

</script>

</body>
</html>
