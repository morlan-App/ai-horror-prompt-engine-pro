<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Horror Prompt Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>AI Horror Prompt Studio</h1>

<div class="panel">

<input id="type" placeholder="Content type (POV vlog)">
<input id="location" placeholder="Location">
<input id="time" placeholder="Time">
<input id="creature" placeholder="Horror creature">

<div class="buttons">

<button onclick="generatePrompt()">Generate Prompt</button>

<button onclick="randomScenario()">Random Horror</button>

<button onclick="generateBatch()">Generate 20 Prompts</button>

</div>

<pre id="output"></pre>
<textarea id="output" rows="10" cols="50"></textarea>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
