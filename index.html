<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Horror Prompt Engine v15</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

.header{
background:#111;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:white;
}

textarea{
width:100%;
height:540px;
background:#111;
border-radius:10px;
border:1px solid #333;
color:#00ff9c;
padding:10px;
font-family:monospace;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
font-weight:bold;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>

</head>

<body>

<div class="header">
AI Horror Prompt Engine v15
</div>

<div class="container">

<div class="card">

<label>AI Engine</label>
<select id="engine">
<option>Grok</option>
<option>Dreamina</option>
<option>Google Flow</option>
</select>

<label>Location</label>
<input id="location" placeholder="abandoned hospital">

<label>Creature</label>
<input id="creature" placeholder="kuntilanak">

<label>Time</label>
<input id="time" placeholder="midnight">

</div>

<div class="card">

<textarea id="output"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</div>

<script>

function generate(){

let location=document.getElementById("location").value
let creature=document.getElementById("creature").value
let time=document.getElementById("time").value
let engine=document.getElementById("engine").value

let output=""

if(engine==="Google Flow"){

output=`

IMAGE PROMPT

Ultra realistic horror frame captured using smartphone POV inside a ${location} at ${time}. A paranormal vlogger holds a shaking flashlight while exploring the dark hallway. At the far end of the corridor the faint silhouette of a ${creature} stands motionless in the darkness. Cinematic horror lighting, realistic found footage atmosphere.

SCENE 1

Scene
Paranormal vlogger slowly walks forward inside the ${location} hallway.

Camera
Handheld smartphone POV with subtle shake.

Action
The flashlight beam scans the corridor cautiously.

Environment
Dusty abandoned building with broken doors and debris.

Lighting
Weak flashlight beam with deep shadows.

Atmosphere
Quiet, tense, echoing footsteps.

Motion
Slow walking movement.

SCENE 2

Scene
The vlogger notices movement in the distance.

Camera
Handheld camera slowly zooms.

Action
The ${creature} briefly appears at the end of the hallway.

Environment
Dark corridor partially hidden by shadows.

Lighting
Flickering flashlight illumination.

Atmosphere
Tension rising.

Motion
Camera shaking slightly from fear.

SCENE 3

Scene
The vlogger steps backward after noticing the ${creature} is closer.

Camera
Unstable handheld movement.

Action
Flashlight quickly scans walls and doorways.

Environment
Narrow hallway.

Lighting
Uneven flashlight lighting.

Atmosphere
Fear and confusion.

Motion
Sudden camera jerks.

SCENE 4

Scene
The ${creature} slowly approaches.

Camera
Rapid handheld shake.

Action
The vlogger backs away.

Environment
Dust floating in the air.

Lighting
Swinging flashlight beam.

Atmosphere
Extreme tension.

Motion
Chaotic movement.

SCENE 5

Scene
The vlogger runs away down the hallway.

Camera
Violent handheld motion.

Action
Footsteps echo loudly.

Environment
Long corridor with broken walls.

Lighting
Flashlight beam bouncing around.

Atmosphere
Panic.

Motion
Running camera movement.

SCENE 6

Scene
The vlogger escapes outside.

Camera
Heavy shaking gradually stabilizes.

Action
The vlogger looks back at the building.

Environment
Dark night outside.

Lighting
Flashlight illuminating the doorway.

Atmosphere
Uneasy silence.

Motion
Slow camera stabilization.

ENGINE
Optimized for Google Flow

`

}

else{

output=`

IMAGE PROMPT

Ultra realistic horror smartphone POV scene inside a ${location} at ${time}. A nervous vlogger explores the corridor using a shaking flashlight. At the far end of the hallway the silhouette of a ${creature} is barely visible in the darkness.

SCENE 1
Handheld POV footage continues inside the ${location}. The vlogger slowly walks forward while the flashlight trembles slightly.

SCENE 2
The camera turns toward a darker corridor where the ${creature} briefly appears.

SCENE 3
The vlogger realizes the ${creature} is closer than before.

SCENE 4
The ${creature} slowly moves toward the camera.

SCENE 5
The vlogger begins running through the corridor while the camera shakes violently.

SCENE 6
The vlogger escapes outside and looks back toward the entrance where the ${creature} disappears.

ENGINE
Optimized for ${engine}

`

}

document.getElementById("output").value=output

}

function copyText(){

navigator.clipboard.writeText(document.getElementById("output").value)
alert("Copied")

}

function downloadText(){

let text=document.getElementById("output").value
let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="horror_prompt.txt"
a.click()

}

function clearText(){

document.getElementById("output").value=""

}

</script>

</body>
</html>
